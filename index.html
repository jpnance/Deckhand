            if (action === 'r' || action === '3') {
              pfrCombos += combos;
            }
          }
          
          if (totalCombos === 0) return null;
          
          return {
            vpip: Math.round(vpipCombos / totalCombos * 100),
            pfr: Math.round(pfrCombos / totalCombos * 100)
          };
        },
        
        describeCurrentRange(action) {
          if (!this.currentRangeId) return [];
          
          const hands = [];
          const rangeHands = this.ranges[this.currentRangeId]?.hands || {};
          const normalizedAction = action === 'r' ? ['r', '3'] : [action];
          
          for (const hand in rangeHands) {
            if (normalizedAction.includes(rangeHands[hand])) {
              hands.push(hand);
            }
          }
          
          if (hands.length === 0) return [];
          if (hands.length === 169) return ['everything'];
          
          const handSet = new Set(hands);
          const parts = [];
          const described = new Set();
          
          for (const [groupName, group] of Object.entries(HAND_GROUPS)) {
            const allInRange = group.all.filter(h => handSet.has(h));
            
            if (allInRange.length === 0) continue;
            
            if (allInRange.length === group.all.length) {
              parts.push(groupName.toLowerCase());
              group.all.forEach(h => described.add(h));
            } else {
              const sortedSubs = Object.entries(group.subgroups)
                .sort((a, b) => b[1].length - a[1].length);
              
              for (const [subName, subHands] of sortedSubs) {
                const subInRange = subHands.filter(h => handSet.has(h) && !described.has(h));
                if (subInRange.length === subHands.length) {
                  parts.push(`${subName.toLowerCase()} ${groupName.toLowerCase()}`);
                  subHands.forEach(h => described.add(h));
                }
              }
              
              const remaining = allInRange.filter(h => !described.has(h));
              if (remaining.length > 0) {
                const compressed = this.compressRange(remaining);
                if (compressed) {
                  parts.push(compressed);
                  remaining.forEach(h => described.add(h));
                }
              }
            }
          }
          
          const ungrouped = hands.filter(h => !described.has(h));
          if (ungrouped.length > 0) {
            const compressed = this.compressRange(ungrouped);
            if (compressed) {
              parts.push(compressed);
            }
          }
          
          return parts;
        },
        
        getResponseCount(scenario, hand) {
          // With new model, we just check if there's an action
          return this.getMyAction(scenario, hand) ? 1 : 0;
        },
        
        getCoverage(scenario) {
          const rangeId = this.scenarioRanges[scenario];
          if (!rangeId) return 0;
          return Object.keys(this.ranges[rangeId]?.hands || {}).length;
        },
        
        getComboCount(hand) {
          if (hand.length === 2) return 6; // pair
          if (hand.endsWith('s')) return 4; // suited
          return 12; // offsuit
        },
        
        getScenarioStats(scenario) {
          let vpipCombos = 0;
          let pfrCombos = 0;
          let threeBetCombos = 0;
          let coveredCombos = 0;
          
          for (const hand of HAND_LIST) {
            const action = this.getMyAction(scenario, hand);
            if (!action) continue;
            
            const combos = this.getComboCount(hand);
            coveredCombos += combos;
            
            if (action === 'c' || action === 'r' || action === '3') {
              vpipCombos += combos;
            }
            if (action === 'r' || action === '3') {
              pfrCombos += combos;
            }
            if (action === '3') {
              threeBetCombos += combos;
            }
          }
          
          if (coveredCombos === 0) return null;
          
          return {
            vpip: Math.round(vpipCombos / coveredCombos * 100),
            pfr: Math.round(pfrCombos / coveredCombos * 100),
            threeBet: Math.round(threeBetCombos / coveredCombos * 100),
            coveredCombos
          };
        },
        
        clearCurrentRange() {
          const rangeId = this.currentRangeId;
          if (!rangeId) return;
          const range = this.ranges[rangeId];
          if (!range) return;
          
          if (confirm(`Clear all hands from "${range.name}"?`)) {
            this.ranges[rangeId].hands = {};
            this.saveRanges();
          }
        },
        
        exportData() {
          const exportObj = {
            ranges: this.ranges,
            scenarioRanges: this.scenarioRanges
          };
          const json = JSON.stringify(exportObj);
          if (navigator.clipboard) {
            navigator.clipboard.writeText(json).then(() => {
              alert('Data copied to clipboard!');
            }).catch(() => {
              this.downloadJson(json);
            });
          } else {
            this.downloadJson(json);
          }
        },
        
        downloadJson(json) {
          const blob = new Blob([json], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'preflop-ranges.json';
          a.click();
          URL.revokeObjectURL(url);
        },
        
        importData() {
          try {
            const data = JSON.parse(this.importText);
            
            // Handle new format
            if (data.ranges) {
              for (const rangeId in data.ranges) {
                this.ranges[rangeId] = data.ranges[rangeId];
              }
              if (data.scenarioRanges) {
                for (const scenario in data.scenarioRanges) {
                  this.scenarioRanges[scenario] = data.scenarioRanges[scenario];
                }
              }
            } else {
              // Handle old myRanges format - create ranges from scenarios
              for (const scenario in data) {
                const rangeId = 'range_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const hands = {};
                for (const hand in data[scenario]) {
                  const val = data[scenario][hand];
                  if (typeof val === 'string') {
                    hands[hand] = val;
                  } else if (typeof val === 'object') {
                    let maxAction = null;
                    let maxCount = 0;
                    for (const action in val) {
                      if (val[action] > maxCount) {
                        maxCount = val[action];
                        maxAction = action;
                      }
                    }
                    if (maxAction) hands[hand] = maxAction;
                  }
                }
                if (Object.keys(hands).length > 0) {
                  const label = SCENARIO_LABELS[scenario] || scenario;
                  this.ranges[rangeId] = { name: label, hands };
                  this.scenarioRanges[scenario] = rangeId;
                }
              }
            }
            
            this.saveRanges();
            this.showImport = false;
            this.importText = '';
            alert('Data imported successfully!');
          } catch (e) {
            alert('Invalid JSON. Please check the data and try again.');
          }
        },
        
        // Edit mode methods
        toggleHandSelection(hand) {
          const idx = this.selectedHands.indexOf(hand);
          if (idx === -1) {
            this.selectedHands.push(hand);
          } else {
            this.selectedHands.splice(idx, 1);
          }
        },
        
        getEmptyCount() {
          const rangeId = this.currentRangeId;
          if (!rangeId) return 0;
          let count = 0;
          for (const hand of HAND_LIST) {
            if (!this.getRangeAction(rangeId, hand)) count++;
          }
          return count;
        },
        
        getActionCount(action) {
          const rangeId = this.currentRangeId;
          if (!rangeId) return 0;
          let count = 0;
          for (const hand of HAND_LIST) {
            const a = this.getRangeAction(rangeId, hand);
            if (action === 'r' && (a === 'r' || a === '3')) count++;
            else if (a === action) count++;
          }
          return count;
        },
        
        selectEmptyHands() {
          const rangeId = this.currentRangeId;
          if (!rangeId) return;
          this.selectedHands = HAND_LIST.filter(hand => !this.getRangeAction(rangeId, hand));
        },
        
        selectByAction(action) {
          const rangeId = this.currentRangeId;
          if (!rangeId) return;
          this.selectedHands = HAND_LIST.filter(hand => {
            const a = this.getRangeAction(rangeId, hand);
            if (action === 'r') return a === 'r' || a === '3';
            return a === action;
          });
        },
        
        selectGroup(hands) {
          // Check if all hands in this group are already selected
          const allSelected = hands.every(h => this.selectedHands.includes(h));
          
          if (allSelected) {
            // Deselect all hands in this group
            this.selectedHands = this.selectedHands.filter(h => !hands.includes(h));
          } else {
            // Add to current selection
            const newSelection = new Set(this.selectedHands);
            for (const hand of hands) {
              newSelection.add(hand);
            }
            this.selectedHands = [...newSelection];
          }
        },
        
        loosenRange(n) {
          const rangeId = this.currentRangeId;
          if (!rangeId) return;
          
          const raiseAction = 'r';
          
          // Find hands currently marked as raise
          const currentRaises = new Set();
          for (const hand of HAND_LIST) {
            const a = this.getRangeAction(rangeId, hand);
            if (a === 'r' || a === '3') currentRaises.add(hand);
          }
          
          // Find next N hands in equity ranking that aren't already raises
          let added = 0;
          for (const hand of EQUITY_RANKING) {
            if (added >= n) break;
            if (!currentRaises.has(hand)) {
              this.setRangeAction(rangeId, hand, raiseAction);
              added++;
            }
          }
        },
        
        tightenRange(n) {
          const rangeId = this.currentRangeId;
          if (!rangeId) return;
          
          // Find hands currently marked as raise, in reverse equity order (weakest first)
          const currentRaises = [];
          for (const hand of [...EQUITY_RANKING].reverse()) {
            const a = this.getRangeAction(rangeId, hand);
            if (a === 'r' || a === '3') currentRaises.push(hand);
          }
          
          // Remove N weakest raises (set to fold)
          let removed = 0;
          for (const hand of currentRaises) {
            if (removed >= n) break;
            this.setRangeAction(rangeId, hand, 'f');
            removed++;
          }
        },
        
        setSelectedHandsAction(action) {
          const rangeId = this.currentRangeId;
          if (!rangeId) return;
          
          for (const hand of this.selectedHands) {
            this.setRangeAction(rangeId, hand, action);
          }
          this.selectedHands = [];
        },
        
        clearSelectedHandsData() {
          const rangeId = this.currentRangeId;
          if (!rangeId) return;
          
          for (const hand of this.selectedHands) {
            this.clearRangeHand(rangeId, hand);
          }
          this.selectedHands = [];
        },
        
        compressRange(hands) {
          if (!hands || hands.length === 0) return '';
          
          const RANKS = 'AKQJT98765432';
          const rankIndex = r => RANKS.indexOf(r);
          
          // Separate into pairs, suited, offsuit
          const pairs = [];
          const suited = {};  // keyed by high card
          const offsuit = {}; // keyed by high card
          
          for (const hand of hands) {
            if (hand.length === 2) {
              // Pair like "AA"
              pairs.push(hand[0]);
            } else if (hand[2] === 's') {
              // Suited like "AKs"
              const high = hand[0];
              const low = hand[1];
              if (!suited[high]) suited[high] = [];
              suited[high].push(low);
            } else {
              // Offsuit like "AKo"
              const high = hand[0];
              const low = hand[1];
              if (!offsuit[high]) offsuit[high] = [];
              offsuit[high].push(low);
            }
          }
          
          const parts = [];
          
          // Compress pairs
          if (pairs.length > 0) {
            pairs.sort((a, b) => rankIndex(a) - rankIndex(b));
            parts.push(...this.compressRanks(pairs, r => r + r));
          }
          
          // Compress suited hands by high card
          for (const high of RANKS) {
            if (suited[high] && suited[high].length > 0) {
              suited[high].sort((a, b) => rankIndex(a) - rankIndex(b));
              parts.push(...this.compressRanks(suited[high], r => high + r + 's'));
            }
          }
          
          // Compress offsuit hands by high card
          for (const high of RANKS) {
            if (offsuit[high] && offsuit[high].length > 0) {
              offsuit[high].sort((a, b) => rankIndex(a) - rankIndex(b));
              parts.push(...this.compressRanks(offsuit[high], r => high + r + 'o'));
            }
          }
          
          return parts.join(', ');
        },
        
        compressRanks(sortedRanks, formatter) {
          const RANKS = 'AKQJT98765432';
          const results = [];
          let i = 0;
          
          while (i < sortedRanks.length) {
            const start = sortedRanks[i];
            let end = start;
            
            // Find consecutive run
            while (i + 1 < sortedRanks.length) {
              const curr = RANKS.indexOf(sortedRanks[i]);
              const next = RANKS.indexOf(sortedRanks[i + 1]);
              if (next === curr + 1) {
                end = sortedRanks[i + 1];
                i++;
              } else {
                break;
              }
            }
            
            if (start === end) {
              results.push(formatter(start));
            } else {
              results.push(formatter(start) + '-' + formatter(end));
            }
            i++;
          }
          
          return results;
        },
        
        describeRange(scenario, action) {
          // Get all hands with this action in this scenario
          const hands = [];
          const normalizedAction = action === 'r' ? ['r', '3'] : [action];
          
          for (const hand of HAND_LIST) {
            const myAction = this.getMyAction(scenario, hand);
            if (normalizedAction.includes(myAction)) {
              hands.push(hand);
            }
          }
          
          if (hands.length === 0) return '';
          if (hands.length === 169) return 'everything';
          
          const handSet = new Set(hands);
          const parts = [];
          const described = new Set();
          
          // Check each hand group
          for (const [groupName, group] of Object.entries(HAND_GROUPS)) {
            const allInRange = group.all.filter(h => handSet.has(h));
            
            if (allInRange.length === 0) continue;
            
            if (allInRange.length === group.all.length) {
              // All hands in this group are in the range
              parts.push(groupName.toLowerCase());
              group.all.forEach(h => described.add(h));
            } else {
              // Check subgroups
              for (const [subName, subHands] of Object.entries(group.subgroups)) {
                const subInRange = subHands.filter(h => handSet.has(h) && !described.has(h));
                if (subInRange.length === subHands.length) {
                  parts.push(`${subName.toLowerCase()} ${groupName.toLowerCase()}`);
                  subHands.forEach(h => described.add(h));
                }
              }
              
              // Describe remaining hands from this group
              const remaining = allInRange.filter(h => !described.has(h));
              if (remaining.length > 0) {
                const compressed = this.compressRange(remaining);
                if (compressed) {
                  parts.push(compressed);
                  remaining.forEach(h => described.add(h));
                }
              }
            }
          }
          
          // Describe any hands not in groups
          const ungrouped = hands.filter(h => !described.has(h));
          if (ungrouped.length > 0) {
            const compressed = this.compressRange(ungrouped);
            if (compressed) {
              parts.push(compressed);
            }
          }
          
          return parts.join(', ');
        },
        
        describeRangeList(scenario, action) {
          // Get all hands with this action in this scenario
          const hands = [];
          const normalizedAction = action === 'r' ? ['r', '3'] : [action];
          
          for (const hand of HAND_LIST) {
            const myAction = this.getMyAction(scenario, hand);
            if (normalizedAction.includes(myAction)) {
              hands.push(hand);
            }
          }
          
          if (hands.length === 0) return [];
          if (hands.length === 169) return ['everything'];
          
          const handSet = new Set(hands);
          const parts = [];
          const described = new Set();
          
          // Check each hand group
          for (const [groupName, group] of Object.entries(HAND_GROUPS)) {
            const allInRange = group.all.filter(h => handSet.has(h));
            
            if (allInRange.length === 0) continue;
            
            if (allInRange.length === group.all.length) {
              parts.push(groupName.toLowerCase());
              group.all.forEach(h => described.add(h));
            } else {
              // Sort subgroups by size (largest first) to prefer broader matches
              const sortedSubs = Object.entries(group.subgroups)
                .sort((a, b) => b[1].length - a[1].length);
              
              for (const [subName, subHands] of sortedSubs) {
                const subInRange = subHands.filter(h => handSet.has(h) && !described.has(h));
                if (subInRange.length === subHands.length) {
                  parts.push(`${subName.toLowerCase()} ${groupName.toLowerCase()}`);
                  subHands.forEach(h => described.add(h));
                }
              }
              
              const remaining = allInRange.filter(h => !described.has(h));
              if (remaining.length > 0) {
                const compressed = this.compressRange(remaining);
                if (compressed) {
                  parts.push(compressed);
                  remaining.forEach(h => described.add(h));
                }
              }
            }
          }
          
          const ungrouped = hands.filter(h => !described.has(h));
          if (ungrouped.length > 0) {
            const compressed = this.compressRange(ungrouped);
            if (compressed) {
              parts.push(compressed);
            }
          }
          
          return parts;
        },
        
        getHandActions(hand) {
          // Get all actions for a hand, ignoring BB:LP check if everything else is fold
          const actions = new Set();
          let bbLpAction = null;
          
          for (const scenario of SCENARIO_KEYS) {
            const action = this.getMyAction(scenario, hand);
            if (!action) continue;
            
            const normalized = action === '3' ? 'r' : action;
            
            if (scenario === 'BB:LP') {
              bbLpAction = normalized;
            } else {
              actions.add(normalized);
            }
          }
          
          // Include BB:LP action unless it's 'c' and everything else is fold
          if (bbLpAction) {
            const isAllFoldOtherwise = actions.size === 0 || (actions.size === 1 && actions.has('f'));
            if (!(bbLpAction === 'c' && isAllFoldOtherwise)) {
              actions.add(bbLpAction);
            }
          }
          
          return actions;
        },
        
        getEditCellClass(hand) {
          const classes = [];
          if (this.selectedHands.includes(hand)) classes.push('selected');
          
          if (this.currentRangeId) {
            const action = this.getRangeAction(this.currentRangeId, hand);
            if (action === 'f') classes.push('action-f');
            else if (action === 'c') classes.push('action-c');
            else if (action === 'r' || action === '3') classes.push('action-r');
            else classes.push('action-none');
          } else {
            const actions = this.getHandActions(hand);
            if (actions.size === 0) classes.push('action-none');
            else if (actions.size === 1) {
              const action = [...actions][0];
              if (action === 'f') classes.push('action-f');
              else if (action === 'c') classes.push('action-c');
              else if (action === 'r') classes.push('action-r');
            } else {
              classes.push('action-mixed');
            }
          }
          
          return classes.join(' ');
        },
        
        getMiniCellClass(hand) {
          const classes = [];
          if (this.selectedHands.includes(hand)) classes.push('selected');
          
          if (this.currentRangeId) {
            const action = this.getRangeAction(this.currentRangeId, hand);
            if (action === 'f') classes.push('action-f');
            else if (action === 'c') classes.push('action-c');
            else if (action === 'r' || action === '3') classes.push('action-r');
          }
          
          return classes.join(' ');
        },
        
        getFeedbackCellClass(hand) {
          const classes = [];
          
          // Highlight the missed hand
          if (hand === this.quizHand) classes.push('missed');
          
          // Color by action in the quiz scenario's range
          const rangeId = this.scenarioRanges[this.quizScenario];
          if (rangeId) {
            const action = this.getRangeAction(rangeId, hand);
            if (action === 'f') classes.push('action-f');
            else if (action === 'c') classes.push('action-c');
            else if (action === 'r' || action === '3') classes.push('action-r');
          }
          
          return classes.join(' ');
        },
        
        getEditCellStyle(hand) {
          if (this.currentRangeId) return '';
          
          const actions = this.getHandActions(hand);
          
          // Coverage opacity
          let filledCount = 0;
          for (const scenario of SCENARIO_KEYS) {
            if (this.getMyAction(scenario, hand)) filledCount++;
          }
          
          let style = '';
          if (filledCount > 0) {
            const opacity = 0.3 + (filledCount / 12) * 0.7;
            style = `opacity: ${opacity};`;
          }
          
          // Dynamic gradient for mixed actions
          if (actions.size > 1) {
            const colors = [];
            if (actions.has('r')) colors.push('var(--action-raise)');
            if (actions.has('c')) colors.push('var(--action-call)');
            if (actions.has('f')) colors.push('var(--action-fold)');
            
            const stops = [];
            const pct = 100 / colors.length;
            colors.forEach((color, i) => {
              stops.push(`${color} ${i * pct}%`);
              stops.push(`${color} ${(i + 1) * pct}%`);
            });
            
            style += `background: linear-gradient(135deg, ${stops.join(', ')});`;
          }
          
          return style;
        },
        
        getHandSummary(hand) {
          const actions = this.getHandActions(hand);
          
          if (actions.size === 0) return null;
          if (actions.size > 1) return 'partial';
          
          const action = [...actions][0];
          if (action === 'f') return 'fold';
          if (action === 'c') return 'call';
          if (action === 'r') return 'raise';
          return 'partial';
        },
        
        showPreview(scenarioKey) {
          this.previewScenario = scenarioKey;
          const scenario = SCENARIOS[scenarioKey];
          
          this.previewYourPosition = this.getPositionIndex(scenario.position, scenario.situation);
          this.previewRaiserPosition = -1;
          this.previewCallerPositions = [];
          this.previewVillainRead = '';
          
          if (scenario.situation === 'open') {
            this.previewVillainRead = '';
          } else if (scenario.situation === 'vs_steal') {
            this.previewRaiserPosition = this.pickRandom([5, 6]);
            this.previewVillainRead = `${POSITIONS[this.previewRaiserPosition]} steal attempt`;
          } else if (scenario.situation === 'vs_weak') {
            const earlier = [];
            for (let i = 0; i < this.previewYourPosition; i++) earlier.push(i);
            if (earlier.length === 0) earlier.push(0);
            this.previewRaiserPosition = this.pickRandom(earlier);
            this.previewVillainRead = `${POSITIONS[this.previewRaiserPosition]} is loose`;
          } else if (scenario.situation === 'vs_strong') {
            const earlier = [];
            for (let i = 0; i < this.previewYourPosition; i++) earlier.push(i);
            if (earlier.length === 0) earlier.push(0);
            this.previewRaiserPosition = this.pickRandom(earlier);
            this.previewVillainRead = `${POSITIONS[this.previewRaiserPosition]} is tight`;
          } else if (scenario.situation === 'limped') {
            const maxLimpers = this.previewYourPosition;
            for (let i = 0; i < maxLimpers; i++) {
              if (Math.random() < 0.6 || this.previewCallerPositions.length === 0) {
                this.previewCallerPositions.push(i);
              }
            }
            if (this.previewCallerPositions.length === 0 && maxLimpers > 0) {
              this.previewCallerPositions.push(maxLimpers - 1);
            }
            this.previewVillainRead = `${this.previewCallerPositions.length} limper${this.previewCallerPositions.length !== 1 ? 's' : ''}`;
          }
        },
        
        // Trainer mode methods
        startTrainer() {
          this.trainerCorrect = 0;
          this.trainerTotal = 0;
          this.mode = 'trainer';
          this.nextTrainerRound();
        },
        
        initTrainerSeats() {
          const seatData = [
            { x: 50, y: 95, side: 'bottom' },   // BTN (bottom center)
            { x: 85, y: 75, side: 'right' },    // CO (bottom right)
            { x: 95, y: 45, side: 'right' },    // HJ (right)
            { x: 85, y: 20, side: 'right' },    // LJ (top right)
            { x: 60, y: 8, side: 'top' },       // MP (top)
            { x: 40, y: 8, side: 'top' },       // UTG+1 (top)
            { x: 15, y: 20, side: 'left' },     // UTG (top left)
            { x: 5, y: 45, side: 'left' },      // BB (left)
            { x: 15, y: 75, side: 'left' },     // SB (bottom left)
          ];
          
          const positionOrder = ['BTN', 'CO', 'HJ', 'LJ', 'MP', 'UTG+1', 'UTG', 'BB', 'SB'];
          
          this.trainerSeats = positionOrder.map((pos, i) => ({
            position: pos,
            x: seatData[i].x,
            y: seatData[i].y,
            side: seatData[i].side,
            isActing: false,
            hasFolded: false,
            hasChips: false,
            chipStacks: []
          }));
        },
        
        generateTrainerHand() {
          this.initTrainerSeats();
          
          const bb = this.trainerBlinds.bb;
          const sb = this.trainerBlinds.sb;
          
          this.trainerPot = sb + bb;
          this.trainerDisplayPot = '???';
          this.trainerActions = [];
          this.trainerStreet = 'Preflop';
          this.trainerActionVisible = false;
          this.trainerCurrentAction = '';
          this.trainerCenterPotVisible = false;
          this.trainerCenterPotChips = [];
          this.trainerStreetPots = {};
          
          // SB and BB have posted blinds
          const sbSeat = this.trainerSeats.find(s => s.position === 'SB');
          const bbSeat = this.trainerSeats.find(s => s.position === 'BB');
          sbSeat.hasChips = true;
          sbSeat.chipStacks = this.amountToChips(sb);
          bbSeat.hasChips = true;
          bbSeat.chipStacks = this.amountToChips(bb);
          
          // Track state for each player
          const playerState = {};
          for (let i = 0; i < 9; i++) {
            const pos = this.trainerSeats[i].position;
            playerState[i] = {
              folded: false,
              currentBet: pos === 'SB' ? sb : (pos === 'BB' ? bb : 0),
              hasActed: false
            };
          }
          
          const actionOrder = this.getActionOrder('preflop');
          let currentBet = bb;
          let lastRaiserIdx = 7; // BB initially
          let raises = 0;
          
          // Keep going until everyone has acted and matched the bet (or folded)
          let actionComplete = false;
          let startIdx = 0; // Start with UTG
          
          while (!actionComplete) {
            actionComplete = true;
            
            for (let i = 0; i < actionOrder.length; i++) {
              const idx = actionOrder[(startIdx + i) % actionOrder.length];
              const state = playerState[idx];
              const seat = this.trainerSeats[idx];
              
              // Skip folded players
              if (state.folded) continue;
              
              // Check if this player needs to act
              const needsToAct = !state.hasActed || state.currentBet < currentBet;
              if (!needsToAct) continue;
              
              // Don't let the last raiser re-raise themselves
              if (state.currentBet === currentBet && state.hasActed) continue;
              
              const isBB = seat.position === 'BB';
              const rand = Math.random();
              let action, amount = 0, totalBet = 0;
              
              const toCall = currentBet - state.currentBet;
              
              if (toCall === 0 && isBB && !state.hasActed) {
                // BB option
                if (rand < 0.5) {
                  action = 'check';
                  totalBet = currentBet;
                } else if (raises < 2) {
                  action = 'raise';
                  totalBet = Math.round(currentBet * 3);
                  amount = totalBet - state.currentBet;
                  currentBet = totalBet;
                  lastRaiserIdx = idx;
                  raises++;
                  actionComplete = false;
                } else {
                  action = 'check';
                  totalBet = currentBet;
                }
              } else if (toCall > 0) {
                // Facing a bet - players with money already in are more likely to call
                const alreadyInvested = state.currentBet > 0;
                const foldThreshold = alreadyInvested ? 0.25 : 0.55;
                
                if (rand < foldThreshold) {
                  action = 'fold';
                } else if (rand < 0.9 || raises >= 2) {
                  action = 'call';
                  amount = toCall;
                  totalBet = currentBet;
                  this.trainerPot += amount;
                } else {
                  action = 'raise';
                  totalBet = Math.round(currentBet * (2.5 + Math.random()));
                  amount = totalBet - state.currentBet;
                  currentBet = totalBet;
                  lastRaiserIdx = idx;
                  raises++;
                  this.trainerPot += amount;
                  actionComplete = false;
                }
              } else {
                // First to act, no bet yet (shouldn't happen preflop but handle it)
                if (rand < 0.6) {
                  action = 'fold';
                } else if (rand < 0.8) {
                  action = 'call';
                  amount = currentBet;
                  totalBet = currentBet;
                  this.trainerPot += amount;
                } else if (raises < 2) {
                  action = 'raise';
                  totalBet = Math.round(currentBet * 3);
                  amount = totalBet;
                  currentBet = totalBet;
                  lastRaiserIdx = idx;
                  raises++;
                  this.trainerPot += amount;
                  actionComplete = false;
                } else {
                  action = 'call';
                  amount = currentBet;
                  totalBet = currentBet;
                  this.trainerPot += amount;
                }
              }
              
              state.hasActed = true;
              if (action === 'fold') {
                state.folded = true;
              } else {
                state.currentBet = totalBet;
              }
              
              this.trainerActions.push({
                idx,
                position: seat.position,
                action,
                amount,
                totalBet
              });
              
              // Check if only one player remains
              const activePlayers = Object.values(playerState).filter(p => !p.folded).length;
              if (activePlayers <= 1) {
                return; // Hand is over
              }
            }
            
            startIdx = 0; // Reset for next orbit if needed
          }
          
          const activePlayers = Object.values(playerState).filter(p => !p.folded).length;
          this.trainerStreetPots['Preflop'] = this.trainerPot;
          
          const foldedIdxs = new Set(
            Object.entries(playerState).filter(([idx, p]) => p.folded).map(([idx]) => parseInt(idx))
          );
          
          if (activePlayers >= 2) {
            this.addPostflopAction(activePlayers, foldedIdxs);
          }
        },
        
        addPostflopAction(playersIn, foldedIdxs) {
          const streets = ['Flop', 'Turn', 'River'];
          const numStreets = Math.floor(Math.random() * 3) + 1;
          
          const betFractions = [0.25, 0.33, 0.33, 0.5, 0.5, 0.5, 0.67, 1.0];
          
          for (let s = 0; s < numStreets && playersIn >= 2; s++) {
            const streetName = streets[s];
            const actionOrder = this.getActionOrder('postflop');
            
            // Track state for this street
            const streetState = {};
            for (const idx of actionOrder) {
              if (!foldedIdxs.has(idx)) {
                streetState[idx] = { hasActed: false, currentBet: 0 };
              }
            }
            
            let currentBet = 0;
            let bets = 0;
            let actionComplete = false;
            
            while (!actionComplete && playersIn >= 2) {
              actionComplete = true;
              
              for (const idx of actionOrder) {
                if (foldedIdxs.has(idx)) continue;
                
                const state = streetState[idx];
                const seat = this.trainerSeats[idx];
                
                // Check if this player needs to act
                const needsToAct = !state.hasActed || state.currentBet < currentBet;
                if (!needsToAct) continue;
                
                const rand = Math.random();
                let action, amount = 0, totalBet = 0;
                
                const toCall = currentBet - state.currentBet;
                
                if (toCall === 0) {
                  // No bet to face
                  if (rand < 0.4) {
                    action = 'check';
                  } else {
                    action = 'bet';
                    const fraction = this.pickRandom(betFractions);
                    totalBet = Math.round(this.trainerPot * fraction);
                    if (totalBet < 2) totalBet = 2;
                    amount = totalBet;
                    currentBet = totalBet;
                    this.trainerPot += amount;
                    bets++;
                    actionComplete = false;
                  }
                } else {
                  // Facing a bet
                  if (rand < 0.45) {
                    action = 'fold';
                    foldedIdxs.add(idx);
                    playersIn--;
                  } else if (rand < 0.9 || bets >= 2) {
                    action = 'call';
                    amount = toCall;
                    totalBet = currentBet;
                    this.trainerPot += amount;
                  } else {
                    action = 'raise';
                    const raiseFraction = this.pickRandom(betFractions);
                    totalBet = currentBet + Math.round(this.trainerPot * raiseFraction);
                    amount = totalBet - state.currentBet;
                    currentBet = totalBet;
                    this.trainerPot += amount;
                    bets++;
                    actionComplete = false;
                  }
                }
                
                state.hasActed = true;
                state.currentBet = totalBet;
                
                this.trainerActions.push({
                  idx,
                  position: seat.position,
                  action,
                  amount,
                  totalBet,
                  street: streetName
                });
                
                if (playersIn <= 1) {
                  actionComplete = true;
                  break;
                }
              }
            }
            
            this.trainerStreetPots[streetName] = this.trainerPot;
          }
        },
        
        getActionOrder(phase) {
          if (phase === 'preflop') {
            return [6, 5, 4, 3, 2, 1, 0, 8, 7]; // UTG first, BB last
          } else {
            return [8, 7, 6, 5, 4, 3, 2, 1, 0]; // SB first, BTN last
          }
        },
        
        amountToChips(amount, forPot = false) {
          const stacks = [];
          let remaining = amount;
          
          if (forPot) {
            // For center pot, create a pile based on pot size
            // Use multiple stacks to show larger amounts
            const reds = Math.floor(remaining / 5);
            remaining = remaining % 5;
            
            if (reds > 0) {
              // Create 2-4 stacks based on pot size
              const numStacks = Math.min(4, Math.max(2, Math.ceil(reds / 5)));
              const chipsPerStack = Math.min(5, Math.ceil(reds / numStacks));
              for (let i = 0; i < numStacks; i++) {
                stacks.push({ color: 'red', count: chipsPerStack });
              }
            }
            
            if (remaining > 0 || stacks.length === 0) {
              stacks.push({ color: 'white', count: Math.max(1, Math.min(remaining, 4)) });
            }
          } else {
            // For player bets, use reds and whites (typical $1/$2 game)
            const reds = Math.floor(remaining / 5);
            if (reds > 0) {
              stacks.push({ color: 'red', count: Math.min(reds, 4) });
              remaining -= reds * 5;
            }
            
            if (remaining > 0) {
              stacks.push({ color: 'white', count: Math.min(remaining, 4) });
            }
          }
          
          return stacks;
        },
        
        async nextTrainerRound() {
          this.generateTrainerHand();
          this.trainerPhase = 'watching';
          this.trainerAnswer = '';
          this.trainerActionIndex = 0;
          this.trainerCurrentStreet = 'Preflop';
          this.trainerCenterPotVisible = false;
          this.trainerCenterPotChips = [];
          
          await this.playStreetActions();
        },
        
        async playStreetActions() {
          this.trainerPhase = 'watching';
          
          while (this.trainerActionIndex < this.trainerActions.length) {
            const action = this.trainerActions[this.trainerActionIndex];
            const seat = this.trainerSeats[action.idx];
            
            // Check if street is changing - if so, quiz first
            const nextStreet = action.street || 'Preflop';
            if (nextStreet !== this.trainerCurrentStreet) {
              // Collect chips and quiz about current street
              await this.collectChipsToCenter();
              this.askStreetPotQuestion();
              return; // Will continue after quiz
            }
            
            seat.isActing = true;
            
            let actionText = '';
            if (action.action === 'fold') {
              actionText = `${seat.position} folds`;
            } else if (action.action === 'check') {
              actionText = `${seat.position} checks`;
            } else if (action.action === 'call') {
              actionText = `${seat.position} calls`;
            } else if (action.action === 'raise') {
              actionText = `${seat.position} raises to $${action.totalBet}`;
            } else if (action.action === 'bet') {
              actionText = `${seat.position} bets $${action.totalBet}`;
            }
            
            this.trainerCurrentAction = actionText;
            this.trainerActionVisible = true;
            
            if (action.action === 'fold') {
              seat.hasFolded = true;
            } else if (action.totalBet > 0) {
              seat.hasChips = true;
              seat.chipStacks = this.amountToChips(action.totalBet);
            }
            
            await this.sleep(2000);
            
            seat.isActing = false;
            this.trainerActionVisible = false;
            
            await this.sleep(300);
            
            this.trainerActionIndex++;
          }
          
          // All actions done - final quiz
          await this.collectChipsToCenter();
          this.askStreetPotQuestion();
        },
        
        askStreetPotQuestion() {
          // Get actions from current street that we can ask about
          const streetActions = this.trainerActions.filter(a => 
            (a.street || 'Preflop') === this.trainerCurrentStreet &&
            (a.action === 'call' || a.action === 'raise' || a.action === 'bet')
          );
          
          // 60% pot question, 40% action question (if there are askable actions)
          const askAction = streetActions.length > 0 && Math.random() > 0.6;
          
          if (askAction) {
            const targetAction = this.pickRandom(streetActions);
            const streetLabel = this.trainerCurrentStreet === 'Preflop' ? 'preflop' : `on the ${this.trainerCurrentStreet.toLowerCase()}`;
            this.trainerActionQuestion = `What did ${targetAction.position} do ${streetLabel}?`;
            this.trainerCorrectAnswer = (targetAction.action === 'bet' || targetAction.action === 'raise') ? 'raise' : 'call';
            this.trainerPhase = 'answer-action';
          } else {
            this.trainerActionQuestion = `What's the pot?`;
            this.trainerCorrectAnswer = this.trainerStreetPots[this.trainerCurrentStreet];
            this.trainerPhase = 'answer-pot';
            this.trainerAnswer = '';
            this.$nextTick(() => {
              if (this.$refs.potInput) this.$refs.potInput.focus();
            });
          }
        },
        
        async continueAfterQuiz() {
          // Move to next street if there are more actions
          if (this.trainerActionIndex < this.trainerActions.length) {
            const nextAction = this.trainerActions[this.trainerActionIndex];
            const nextStreet = nextAction.street || 'Preflop';
            this.trainerCurrentStreet = nextStreet;
            this.trainerStreet = nextStreet;
            await this.sleep(600);
            await this.playStreetActions();
          } else {
            // Hand is over, start new hand
            this.nextTrainerRound();
          }
        },
        
        async collectChipsToCenter() {
          // Calculate total chips on table
          let totalOnTable = 0;
          for (const seat of this.trainerSeats) {
            if (seat.hasChips && seat.chipStacks.length > 0) {
              for (const stack of seat.chipStacks) {
                const value = stack.color === 'black' ? 100 : stack.color === 'green' ? 25 : stack.color === 'red' ? 5 : 1;
                totalOnTable += value * stack.count;
              }
            }
          }
          
          if (totalOnTable > 0) {
            // Add to center pot
            const existingCenter = this.trainerCenterPotChips.reduce((sum, stack) => {
              const value = stack.color === 'black' ? 100 : stack.color === 'green' ? 25 : stack.color === 'red' ? 5 : 1;
              return sum + value * stack.count;
            }, 0);
            
            this.trainerCenterPotChips = this.amountToChips(existingCenter + totalOnTable, true);
            this.trainerCenterPotVisible = true;
            
            // Clear chips from seats
            for (const seat of this.trainerSeats) {
              seat.hasChips = false;
              seat.chipStacks = [];
            }
            
            await this.sleep(400);
          }
        },
        
        sleep(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
        },
        
        async checkPotAnswer() {
          const answer = parseInt(this.trainerAnswer.replace(/[$,]/g, ''), 10);
          const tolerance = this.trainerCorrectAnswer * 0.05;
          const isCorrect = Math.abs(answer - this.trainerCorrectAnswer) <= Math.max(tolerance, 2);
          
          this.trainerTotal++;
          if (isCorrect) {
            this.trainerCorrect++;
            this.trainerLastCorrect = true;
            this.trainerFeedbackText = `Correct! $${this.trainerCorrectAnswer}`;
          } else {
            this.trainerLastCorrect = false;
            this.trainerFeedbackText = `$${this.trainerCorrectAnswer} (you said $${answer || 0})`;
          }
          
          this.trainerPhase = 'feedback';
          
          // Brief pause then continue
          await this.sleep(1500);
          await this.continueAfterQuiz();
        },
        
        async checkActionAnswer(answer) {
          const isCorrect = answer === this.trainerCorrectAnswer;
          
          this.trainerTotal++;
          if (isCorrect) {
            this.trainerCorrect++;
            this.trainerLastCorrect = true;
            this.trainerFeedbackText = `Correct!`;
          } else {
            this.trainerLastCorrect = false;
            const actionLabel = this.trainerCorrectAnswer === 'raise' ? 'raised/bet' : 'called';
            this.trainerFeedbackText = `They ${actionLabel}`;
          }
          
          this.trainerPhase = 'feedback';
          
          // Brief pause then continue
          await this.sleep(1500);
          await this.continueAfterQuiz();
        }
      };
    }
  </script>
